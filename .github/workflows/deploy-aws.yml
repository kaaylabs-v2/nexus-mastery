name: Deploy Services to Nexus-Mastery

on:
  push:
    branches:
      - devops-infra
      - qa
      - master

  workflow_dispatch:
    inputs:
      service:
        description: 'Select the service to deploy'
        required: true
        type: choice
        options:
          - apps/admin
          - apps/web
          - services/api

      environment:
        description: 'Select environment'
        required: true
        type: choice
        options:
          - devops-infra
          - qa
          - master

env:
  AWS_REGION: us-west-2

  # Admin
  ADMIN_ECR_REPOSITORY: nexus-mastery-admin
  ADMIN_ECS_CLUSTER: nexus-mastery
  ADMIN_ECS_SERVICE: nexus-mastery-admin
  ADMIN_CONTAINER_NAME: nexus-mastery-admin

  # Web
  WEB_ECR_REPOSITORY: nexus-mastery-web
  WEB_ECS_CLUSTER: nexus-mastery
  WEB_ECS_SERVICE: nexus-mastery-web
  WEB_CONTAINER_NAME: nexus-mastery-web

  # API
  API_ECR_REPOSITORY: nexus-mastery-service
  API_ECS_CLUSTER: nexus-mastery
  API_ECS_SERVICE: nexus-mastery-service
  API_CONTAINER_NAME: nexus-mastery-service

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-services.outputs.services }}
    steps:
      - id: set-services
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "services=[\"${{ github.event.inputs.service }}\"]" >> $GITHUB_OUTPUT
          else
            echo 'services=["apps/admin", "apps/web", "services/api"]' >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.setup.outputs.services) }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔧 Service Config
      - name: Configure Variables
        id: config
        run: |
          if [ "${{ matrix.service }}" == "apps/admin" ]; then
            echo "working_dir=apps/admin" >> $GITHUB_OUTPUT
            echo "ecr_repository=${{ env.ADMIN_ECR_REPOSITORY }}" >> $GITHUB_OUTPUT
            echo "ecs_cluster=${{ env.ADMIN_ECS_CLUSTER }}" >> $GITHUB_OUTPUT
            echo "ecs_service=${{ env.ADMIN_ECS_SERVICE }}" >> $GITHUB_OUTPUT
            echo "container_name=${{ env.ADMIN_CONTAINER_NAME }}" >> $GITHUB_OUTPUT

          elif [ "${{ matrix.service }}" == "apps/web" ]; then
            echo "working_dir=apps/web" >> $GITHUB_OUTPUT
            echo "ecr_repository=${{ env.WEB_ECR_REPOSITORY }}" >> $GITHUB_OUTPUT
            echo "ecs_cluster=${{ env.WEB_ECS_CLUSTER }}" >> $GITHUB_OUTPUT
            echo "ecs_service=${{ env.WEB_ECS_SERVICE }}" >> $GITHUB_OUTPUT
            echo "container_name=${{ env.WEB_CONTAINER_NAME }}" >> $GITHUB_OUTPUT

          elif [ "${{ matrix.service }}" == "services/api" ]; then
            echo "working_dir=services/api" >> $GITHUB_OUTPUT
            echo "ecr_repository=${{ env.API_ECR_REPOSITORY }}" >> $GITHUB_OUTPUT
            echo "ecs_cluster=${{ env.API_ECS_CLUSTER }}" >> $GITHUB_OUTPUT
            echo "ecs_service=${{ env.API_ECS_SERVICE }}" >> $GITHUB_OUTPUT
            echo "container_name=${{ env.API_CONTAINER_NAME }}" >> $GITHUB_OUTPUT
          fi

      # 🔐 AWS Credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 🔍 Verify AWS
      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      # 🔑 Login to ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 📥 Download ENV from S3
      - name: Download .env from S3
        run: |
          if [ "${{ matrix.service }}" == "apps/admin" ]; then
            aws s3 cp s3://nexus-mastery/admin/.env apps/admin/.env

          elif [ "${{ matrix.service }}" == "apps/web" ]; then
            aws s3 cp s3://nexus-mastery/web/.env apps/web/.env

          else
            echo "Skipping .env for API"
          fi

      # 🧪 Debug (optional)
      - name: Verify files
        run: |
          ls -R

      # 📦 Build & Push (MONOREPO FIXED)
      - name: Build and Push Image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ steps.config.outputs.ecr_repository }}
          IMAGE_TAG: ${{ github.sha }}
          WORKING_DIR: ${{ steps.config.outputs.working_dir }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f $WORKING_DIR/Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # 📥 Fetch Task Definition
      - name: Fetch Task Definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ steps.config.outputs.container_name }} \
            --query taskDefinition \
            > task-definition.json

      # 🧹 Clean JSON
      - name: Clean Task Definition
        run: |
          cat task-definition.json | jq 'del(
            .taskDefinitionArn,
            .revision,
            .status,
            .requiresAttributes,
            .compatibilities,
            .registeredAt,
            .registeredBy
          )' > cleaned-task-def.json

      # 🔄 Update Image
      - name: Render Task Definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: cleaned-task-def.json
          container-name: ${{ steps.config.outputs.container_name }}
          image: ${{ steps.build-image.outputs.image }}

      # 🚀 Deploy
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ steps.config.outputs.ecs_service }}
          cluster: ${{ steps.config.outputs.ecs_cluster }}
          wait-for-service-stability: true
